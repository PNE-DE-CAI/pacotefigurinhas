<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacotes de Figurinhas — Copa REPLANEJAMENTO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
@media print{
  body{background:#fff!important;padding:0!important}
  .page{max-width:100%;padding:0}
  .page-title,.subtitle,.footer,.print-btn,.legend{display:none!important}
  .pack{break-inside:avoid;page-break-inside:avoid;border:2px solid #0a2f6c!important;box-shadow:none!important;margin:8px 0!important}
  .pack-hdr{background:#0a2f6c!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sticker-row:nth-child(even){background:#f0f4f8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .grid{gap:10px}
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#e8ecf1;min-height:100vh;padding:20px;color:#1e293b}
.page{max-width:900px;margin:0 auto}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:#0a2f6c;letter-spacing:.05em;text-align:center;margin-bottom:4px}
.subtitle{font-size:.85rem;color:#64748b;text-align:center;margin-bottom:20px}
.print-btn{display:block;margin:0 auto 24px;background:#0a2f6c;color:#fff;border:none;border-radius:40px;padding:12px 32px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s}
.print-btn:hover{background:#d32f2f;transform:scale(1.03)}
.legend{display:flex;justify-content:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;font-size:.72rem;color:#64748b}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:10px;height:10px;border-radius:3px}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}

.pack{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08);border:1px solid #e2e8f0;transition:transform .2s}
.pack:hover{transform:translateY(-2px)}
.pack-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;color:#fff}
.pack-num{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.04em;line-height:1}
.pack-label{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.8}
.pack-flag{font-size:1.5rem}

.sticker-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f1f5f9;transition:background .15s}
.sticker-row:last-child{border-bottom:none}
.sticker-row:nth-child(even){background:#f8fafc}
.stk-flag{font-size:1.8rem;line-height:1;min-width:32px;text-align:center}
.stk-info{flex:1;min-width:0}
.stk-country{font-size:.78rem;font-weight:700;color:#0a2f6c;line-height:1.2}
.stk-school{font-size:.6rem;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stk-code{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;color:#d32f2f;background:#fff5f5;border:1px solid #fecaca;border-radius:8px;padding:4px 12px;letter-spacing:.08em;white-space:nowrap;user-select:all}

.pack-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#f8fafc;border-top:1px solid #f1f5f9}
.pack-footer img{height:20px;border-radius:4px}
.pack-footer span{font-size:.55rem;color:#94a3b8;letter-spacing:.04em}
.pack-total{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#94a3b8}

footer{text-align:center;margin-top:28px;font-size:.7rem;color:#94a3b8;padding:12px;border-top:1px solid #e2e8f0}

@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>

  <button class="print-btn" onclick="window.print()">&#128424; Imprimir Pacotes</button>

    <span><span class="dot" style="background:#002395"></span>Europa I</span>
